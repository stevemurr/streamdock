# Example control-loop config (YAML, the canonical format).  Run it with:
#   uv run streamdock run streamdock.yaml
# ...or edit it visually with:
#   uv run streamdock ui
#
# Positions are reading order, 0 = top-left .. 14 = bottom-right (3x5 grid).
# Each key may set:
#   label   -> caption text
#   icon    -> a built-in glyph (see `streamdock icons`)
#   color   -> "#rrggbb" or "r,g,b" (a gradient + contrast is derived from it)
#   image   -> path to an image file (relative to this config); overrides icon/label
#   level   -> 0..1 fill for the brightness/meter icons (else read from the label)
#   app     -> macOS app name to open on press (sugar for: open -a "<app>")
#   command -> shell command run on press (raw; wins over `app` if both set)
#   action  -> "sleep", or "page:next" / "page:prev" / "page:<name>"
#
# Keys live on named pages; `page:` actions switch between them (next/prev wrap).
# While `streamdock run` is live, saving this file hot-reloads it on the deck.

settings:
  brightness: 80
  keepalive_seconds: 2.0    # ping interval so the device stays awake (not kiosk)
  clear_on_exit: true
  # env_file: secrets.env   # optional KEY=VALUE file loaded into the command env

pages:
  - name: main
    keys:
      - {position: 0, label: Term, icon: monitor, color: '#1e6ea0', app: Terminal}
      - {position: 1, label: Chrome, icon: dot, color: '#c0392b', app: Google Chrome}
      - {position: 2, label: Finder, icon: gear, color: '#2c3e50', command: open ~}
      - {position: 5, label: Lock, icon: lock, color: '#922b21', command: pmset displaysleepnow}
      # sleeps the deck's own displays; any key press wakes it back up
      - {position: 6, label: Sleep, icon: moon, color: '#241f47', action: sleep}
      - {position: 14, label: Media, icon: cycle, color: '#3a3f4a', action: 'page:next'}

  - name: media
    keys:
      - {position: 0, label: Play, icon: play, color: '#27632a',
         command: "osascript -e 'tell application \"Music\" to playpause'"}
      - {position: 3, label: Vol+, icon: plus, color: '#27632a',
         command: "osascript -e 'set volume output volume ((output volume of (get volume settings)) + 10)'"}
      - {position: 4, label: Vol-, icon: minus, color: '#7d6608',
         command: "osascript -e 'set volume output volume ((output volume of (get volume settings)) - 10)'"}
      - {position: 14, label: Main, icon: cycle, color: '#3a3f4a', action: 'page:main'}
