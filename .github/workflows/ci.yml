name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hidapi (native lib)
        run: brew install hidapi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Build native macOS app
        working-directory: macos
        run: swift build --target StreamDockApp

      - name: Test native core
        working-directory: macos
        run: swift test

      - name: Run native integration checks
        working-directory: macos
        run: swift run StreamDockCoreChecks
