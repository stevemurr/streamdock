# Example control-loop config.  Run it with:  uv run streamdock run streamdock.toml
#
# Positions are reading order: 0 = top-left .. 12 = bottom-right.
# On this unit positions 0-9 are LCD keys; 10-12 are screenless buttons that
# still trigger their `command` on press.
#
# Each [[keys]] entry may set:
#   label   -> text drawn on the key (LCD keys only)
#   color   -> "#rrggbb" or "r,g,b" (label background, or solid fill)
#   image   -> path to an image file (relative to this config), overrides label
#   command -> shell command run when the key is pressed

[settings]
brightness = 80
keepalive_seconds = 2.0     # how often to ping the device so it stays awake
clear_on_exit = true

[[keys]]
position = 0
label = "Term"
color = "#1e6ea0"
command = "open -a Terminal"

[[keys]]
position = 1
label = "Chrome"
color = "#c0392b"
command = "open -a 'Google Chrome'"

[[keys]]
position = 2
label = "Finder"
color = "#2c3e50"
command = "open ~"

[[keys]]
position = 3
label = "Vol+"
color = "#27632a"
command = "osascript -e 'set volume output volume ((output volume of (get volume settings)) + 10)'"

[[keys]]
position = 4
label = "Vol-"
color = "#7d6608"
command = "osascript -e 'set volume output volume ((output volume of (get volume settings)) - 10)'"

[[keys]]
position = 5
label = "Mute"
color = "#4a235a"
command = "osascript -e 'set volume with output muted'"

[[keys]]
position = 9
label = "Lock"
color = "#922b21"
command = "pmset displaysleepnow"

# a screenless bottom button — no display, but the press still fires
[[keys]]
position = 10
command = "say ready"
